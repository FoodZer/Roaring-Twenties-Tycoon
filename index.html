<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Assembly 1926</title>
    <style>
        :root {
            --deco-gold: #c5a059;
            --blueprint-blue: #1a2a3a;
            --industrial-grey: #333;
            --money-green: #85bb65;
            --bg-dark: #0f161d;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a2a3a 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
            border: 15px double var(--deco-gold);
            box-sizing: border-box;
        }

        .deco-border {
            border: 2px solid var(--deco-gold);
            padding: 40px;
            background: rgba(0,0,0,0.5);
        }

        #splash-screen h1 {
            font-size: 4rem;
            margin: 0;
            color: var(--deco-gold);
            font-family: 'Times New Roman', serif;
            letter-spacing: 10px;
            text-transform: uppercase;
            text-shadow: 3px 3px 0px #000;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--deco-gold);
            margin-bottom: 40px;
            letter-spacing: 3px;
        }

        .start-btn {
            background: transparent;
            color: var(--deco-gold);
            border: 3px solid var(--deco-gold);
            padding: 15px 50px;
            font-size: 1.5rem;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .start-btn:hover {
            background: var(--deco-gold);
            color: black;
            box-shadow: 0 0 20px var(--deco-gold);
        }

        /* --- MAIN UI --- */
        #hud {
            height: 70px;
            background: #000;
            border-bottom: 3px solid var(--deco-gold);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            padding: 0 10px;
        }

        .balance { font-size: 24px; color: var(--money-green); font-weight: bold; }

        .btn-action {
            background: var(--deco-gold);
            color: black; border: none; padding: 8px 12px;
            font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 12px;
        }

        #viewport { display: flex; flex-grow: 1; overflow-y: auto; visibility: hidden; }

        #conveyor-shaft {
            width: 130px; background: #111; border-right: 4px solid var(--deco-gold);
            display: flex; flex-direction: column; align-items: center;
            position: sticky; top: 0; min-height: 100%;
        }

        #factory-floor {
            flex-grow: 1; padding: 20px; display: flex; flex-direction: column; gap: 20px; max-width: 800px;
        }

        .component-card { background: #222; border: 2px solid var(--deco-gold); padding: 15px; position: relative; }
        .progress-container { width: 100%; height: 12px; background: #000; margin: 10px 0; border: 1px solid #444; }
        .progress-bar { height: 100%; background: var(--deco-gold); width: 0%; }
        .btn-upgrade { background: var(--deco-gold); border: none; padding: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-upgrade:disabled { background: #555; opacity: 0.5; cursor: not-allowed; }
        .manager-slot { width: 45px; height: 45px; background: #333; border: 2px solid var(--deco-gold); display: flex; justify-content: center; align-items: center; font-size: 20px; cursor: pointer; }
        .stats-row { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-bottom: 4px;}
        h3 { margin: 0 0 10px 0; color: var(--deco-gold); font-size: 16px; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="deco-border">
        <h1>THE GREAT ASSEMBLY</h1>
        <div class="subtitle">ESTABLISHED 1926 • DETROIT, MI</div>
        <button class="start-btn" onclick="startGame()">Enter Factory</button>
    </div>
</div>

<div id="hud">
    <div class="balance" id="money-display">$500</div>
    <button class="btn-action" onclick="activateBoost()" id="boost-btn">📻 PLAY JAZZ (4x)</button>
    <button class="btn-action" style="background:#888;" onclick="resetGame()">🗑️ RESET</button>
</div>

<div id="viewport">
    <div id="conveyor-shaft">
        <div class="component-card" style="width: 100px; margin-top: 10px; padding: 10px;">
            <div class="stats-row"><span>Lvl</span><span id="belt-lvl">1</span></div>
            <div class="progress-container"><div id="bar-belt" class="progress-bar"></div></div>
            <div class="stats-row"><span>Stock:</span><span id="belt-stock">0</span></div>
            <button class="btn-upgrade" id="btn-up-belt" onclick="upgradeBelt()">UP $<span id="cost-belt">50</span></button>
        </div>
        <div style="writing-mode: vertical-rl; margin-top: 40
